<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Listing Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #8993c0 0%, #7f6797 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgb(255, 255, 255);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 380px;
            width: 50%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        .card-image {
            width: 100%;
            height: 20px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-image {
            transform: scale(1.05);
        }

        .card-content {
            padding: 24px;
        }

        .card-price {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-title {
            color: #1a202c;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-location {
            color: #718096;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .card-location::before {
            content: "📍";
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .card {
                max-width: 100%;
            }

            .card-content {
                padding: 16px;
            }

            .card-price {
                font-size: 24px;
            }

            .card-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="C:\Users\Meenu\Desktop\websites\vacatu.iu.enc"width="400px" height="250px">
        <div class="card-content">
            <div class="card-price">$485,000</div>
            <h2 class="card-title">PROPERTY LISTING CARD (Vacatu.iu)</h2>
            <p class="card-location">INDIA</p>
            <button class="btn">View Details</button>
        </div>
    </div>
</body>
</html>
